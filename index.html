<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>训练打卡 - Cycle 1</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5; margin: 0; padding: 0 0 80px 0; color: #1a1a2e;
  font-size: 16px; line-height: 1.5;
}

/* header */
.app-header {
  background: linear-gradient(135deg, #1a1a2e, #2d3a6e);
  color: #fff; padding: 16px 18px; position: sticky; top: 0; z-index: 10;
}
.app-header h1 { margin: 0; font-size: 20px; font-weight: 700; }
.app-header .sub { font-size: 13px; opacity: 0.8; margin-top: 2px; }

/* session selector */
.session-bar {
  display: flex; gap: 6px; overflow-x: auto; padding: 10px 14px;
  background: #fff; border-bottom: 1px solid #e0e3e8;
  -webkit-overflow-scrolling: touch; position: sticky; top: 74px; z-index: 9;
}
.session-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1.5px solid #d0d4dc;
  background: #fff; font-size: 13px; font-weight: 600; color: #555; cursor: pointer;
  white-space: nowrap; transition: all 0.2s;
}
.session-btn.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
.session-btn.done { border-color: #2d7d46; color: #2d7d46; }
.session-btn.done::after { content: ' ✅'; font-size: 11px; }

/* save indicator */
.save-indicator {
  text-align: center; font-size: 12px; color: #999; padding: 6px;
  position: sticky; top: 126px; background: #f0f2f5; z-index: 8;
}

/* pre-check */
.pre-section {
  background: #fff; margin: 10px 14px; border-radius: 10px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.pre-section h3 { font-size: 14px; margin: 0 0 10px; font-weight: 600; color: #555; }
.pre-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.pre-grid label {
  display: flex; align-items: center; gap: 6px; font-size: 15px;
  padding: 6px 12px; border: 1.5px solid #e0e3e8; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.pre-grid input { width: 18px; height: 18px; accent-color: #4a6cf7; margin: 0; }
.pre-grid label:has(input:checked) { border-color: #4a6cf7; background: #f0f2ff; }

/* note banner */
.note-banner {
  background: linear-gradient(135deg,#e8f5e9,#dff0e2);
  border-left: 4px solid #2d7d46; margin: 0 14px 10px; padding: 10px 14px;
  border-radius: 8px; font-size: 14px;
}

/* exercise card */
.card {
  background: #fff; margin: 0 14px 10px; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden;
}
.card-header {
  display: flex; align-items: center; gap: 8px; padding: 14px 16px 8px;
}
.card-num {
  width: 28px; height: 28px; border-radius: 50%; background: #4a6cf7;
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.card-name { font-weight: 700; font-size: 17px; }
.card-target { font-size: 13px; color: #2d7d46; font-weight: 600; background: #e8f5e9; padding: 1px 10px; border-radius: 10px; }
.card-meta { font-size: 13px; color: #888; }
.card-meta-line {
  display: flex; align-items: center; gap: 8px; padding: 0 16px 8px;
}
.card-tips {
  font-size: 14px; color: #333; padding: 0 16px 6px;
  border-left: 3px solid #4a6cf7; margin: 0 16px 8px; padding-left: 10px;
}
.card-bad {
  font-size: 13px; color: #b64a4a; padding: 0 16px 6px;
  border-left: 3px solid #e53935; margin: 0 16px 8px; padding-left: 10px;
}

/* set rows */
.sets { padding: 0 16px 10px; }
.set-row {
  display: flex; align-items: center; gap: 6px; padding: 8px 0;
  border-bottom: 1px solid #f0f2f5;
}
.set-row:last-child { border-bottom: none; }
.set-num { font-weight: 700; font-size: 15px; min-width: 24px; color: #888; }
.set-weight, .set-reps { display: flex; align-items: center; gap: 2px; }
.set-weight input, .set-reps input {
  width: 48px; font-size: 17px; padding: 6px 4px; text-align: center;
  border: 1.5px solid #d0d4dc; border-radius: 8px; background: #fafbff;
}
.set-weight input::placeholder, .set-reps input::placeholder {
  color: #c0c4cc; font-size: 14px; font-weight: 400;
}
.set-weight .u, .set-reps .u { font-size: 13px; color: #999; }

/* RPE radio */
.rpe-group {
  display: flex; gap: 0;
  background: #f5f6fa; border-radius: 8px; overflow: hidden;
}
.rpe-group label {
  display: flex; align-items: center; gap: 2px; padding: 6px 6px;
  font-size: 14px; cursor: pointer; border-right: 1px solid #e0e3e8;
}
.rpe-group label:last-child { border-right: none; }
.rpe-group label:has(input:checked) { background: #4a6cf7; color: #fff; }
.rpe-group input { width: 16px; height: 16px; margin: 0; accent-color: #4a6cf7; }

/* done checkbox */
input:focus { outline: none; }

/* RPE legend */
.rpe-legend {
  display: flex; gap: 4px 10px; flex-wrap: wrap; font-size: 12px;
  padding: 8px 16px 0; color: #666;
}
.rpe-dot { display: inline-block; width: 16px; height: 16px; border-radius: 50%; text-align: center; line-height: 16px; font-size: 9px; font-weight: 700; color: #fff; }

/* feel tags */
.feel-section {
  padding: 0 16px 14px; display: flex; flex-wrap: wrap; gap: 6px;
}
.feel-label { font-size: 13px; color: #888; margin-right: 4px; padding-top: 4px; }
.feel-section label {
  display: flex; align-items: center; gap: 4px; font-size: 14px;
  padding: 5px 10px; border: 1.5px solid #e0e3e8; border-radius: 8px; cursor: pointer;
}
.feel-section input { width: 16px; height: 16px; accent-color: #f5a623; margin: 0; }
.feel-section label:has(input:checked) { border-color: #f5a623; background: #fff8e1; }

/* bottom section */
.bottom-section {
  background: #fff; margin: 0 14px 10px; border-radius: 12px;
  padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.bottom-section h3 { font-size: 15px; margin: 0 0 8px; font-weight: 600; }
.tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.tag-group label {
  display: flex; align-items: center; gap: 4px; font-size: 14px;
  padding: 6px 12px; border: 1.5px solid #e0e3e8; border-radius: 8px; cursor: pointer;
}
.tag-group input { width: 16px; height: 16px; accent-color: #4a6cf7; margin: 0; }
.tag-group label:has(input:checked) { border-color: #4a6cf7; background: #f0f2ff; }

/* scale row */
.scales { margin: 10px 0 0; }
.scale-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.scale-item .sl { font-weight: 600; font-size: 14px; min-width: 52px; }
.scale-opts { display: flex; gap: 0; background: #f5f6fa; border-radius: 8px; overflow: hidden; }
.scale-opts label {
  padding: 7px 10px; font-size: 13px; cursor: pointer;
  border-right: 1px solid #e0e3e8; white-space: nowrap;
}
.scale-opts label:last-child { border-right: none; }
.scale-opts label:has(input:checked) { background: #4a6cf7; color: #fff; }
.scale-opts input { width: 0; height: 0; opacity: 0; position: absolute; }

/* notes */
.notes-area { margin-top: 6px; }
.notes-area textarea {
  width: 100%; font-size: 16px; padding: 10px 12px; border-radius: 8px;
  border: 1.5px solid #d0d4dc; min-height: 80px; overflow: hidden;
  font-family: inherit; background: #fafbff; resize: none;
}

/* save btn */
.save-btn {
  display: block; width: calc(100% - 28px); margin: 10px 14px; padding: 14px;
  background: #4a6cf7; color: #fff; border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; cursor: pointer;
  position: fixed; bottom: 10px; left: 0; z-index: 20;
  box-shadow: 0 4px 12px rgba(74,108,247,0.3);
}
.save-btn:active { transform: scale(0.98); }

/* dark mode support */
@media (prefers-color-scheme: dark) {
  body { background: #1a1a2e; color: #e8eaef; }
  .app-header { background: linear-gradient(135deg,#0f0f1a,#1a2550); }
  .session-bar, .pre-section, .card, .bottom-section { background: #252540; }
  .session-btn { background: #252540; border-color: #3a3a55; color: #aaa; }
  .session-btn.active { background: #4a6cf7; color: #fff; }
  .set-weight input, .set-reps input { background: #1e1e35; border-color: #3a3a55; color: #e8eaef; }
  .rpe-group { background: #1e1e35; }
  .rpe-group label { border-color: #3a3a55; }
  .rpe-group label:has(input:checked) { background: #4a6cf7; }
  .scale-opts { background: #1e1e35; }
  .scale-opts label { border-color: #3a3a55; }
  .scale-opts label:has(input:checked) { background: #4a6cf7; }
  .pre-grid label { border-color: #3a3a55; }
  .pre-grid label:has(input:checked) { background: #1e1e3a; border-color: #4a6cf7; }
  .feel-section label { border-color: #3a3a55; }
  .tag-group label { border-color: #3a3a55; }
  .tag-group label:has(input:checked) { background: #1e1e3a; border-color: #4a6cf7; }
  .notes-area textarea { background: #1e1e35; border-color: #3a3a55; color: #e8eaef; }
}

@media (max-width: 400px) {
  .rpe-group label { padding: 6px 4px; font-size: 13px; }
  .set-weight input, .set-reps input { width: 40px; }
}
</style>
</head>

<div id="app"></div>
<script>
// ═══════════ DATA ═══════════

  {id:'dbCurl',      name:'哑铃弯举',        t:'3×12-15', tm:'2-0-1-0', rs:'45s', tips:'肘固定 · 不借力摆动 · 顶峰收缩1秒', bad:'身体摆动 · 肘前移 · 放太快', feel:['二头酸','前臂胀']}
];
const M = {}; EX.forEach(e=>M[e.id]=e);

const CARDIO = ['没做','跑步机','椭圆机','划船机','单车','爬楼机','坡度快走(推荐)'];
const CDUR = ['5分','10分','15分','20分','25分','30分'];

// Per-exercise stretches — session stretches derived automatically from exs[]
const STRETCH_BY_EX = {

  chestPress:  [{id:'chest', m:'胸大肌',   how:'侧对墙壁站立，手臂伸直扶墙与肩同高，身体向前转向外侧，感到胸肌拉伸，保持30秒/侧'}],
  row:         [{id:'lat',   m:'背阔肌',   how:'双手扶住深蹲架或稳固物体，后退一步屈髋，臀部后坐、低头，让背部完全展开，保持30秒'}],

  legExt:      [{id:'quad',  m:'股四头肌', how:'站立扶墙，同侧手抓脚踝拉向臀部，膝盖指向地面，感到大腿前侧拉伸，保持30秒/侧'}],
  facePull:    [{id:'rdelt', m:'三角肌后束', how:'一侧手臂伸直横过胸前，另一手勾住肘部轻轻拉向身体，保持30秒/侧'}],
  plank:       [{id:'core',  m:'腹肌',     how:'俯卧在垫子上，双手撑地将上半身推起，髋部贴地，抬头看天花板（眼镜蛇式），保持30秒'}],
  rdl:         [{id:'ham',   m:'腘绳肌',   how:'坐姿，一腿向前伸直，身体前倾双手够脚尖，背保持挺直，保持30秒/侧'},
                {id:'glute', m:'臀大肌',   how:'仰卧，一腿屈膝，另一腿脚踝搭在对侧膝盖上，双手抱大腿后侧拉向胸口，保持30秒/侧'}],
  dbCurl:      [{id:'bicep', m:'肱二头肌', how:'手臂前伸掌心朝上，另一手抓住手指轻轻向后掰，感到手臂前侧拉伸，保持30秒/侧'}],
};

// Build unique stretch list for a session's exercises
function sessionStretches(session) {
  const seen = new Set(), list = [];
  session.exs.forEach(eid => {
    (STRETCH_BY_EX[eid] || []).forEach(s => {
      if (!seen.has(s.id)) { seen.add(s.id); list.push(s); }
    });
  });
  return list;
}

  {l:'满意度', o:['不满意','还行','满意','非常满意']}

const SESSIONS = [
  {wk:1,n:1,tt:'训练A · 推偏重', note:'找发力感为主，选让最后2次稍费力的重量', isA:true, exs:['legPress','chestPress','row','shPress','legCurl','cableCrunch'], tg:{legPress:'从30kg开始试探，找12次标准重量',chestPress:'从20kg开始→第2组试25kg',row:'从20kg开始，逐组加片找发力感',shPress:'20kg起→第2组试25kg',legCurl:'10kg起→第3组试12kg',cableCrunch:'45kg起→逐组加到55kg'}, dw:{legPress:['30','30','30'],chestPress:['20','25','25'],row:['20','25','30'],shPress:['20','25','25'],legCurl:['10','10','12'],cableCrunch:['45','50','55']},

<b style="color:#2d7d46;font-size:15px;">👨‍🏫 教练分析（7/13 训练后）</b><br><br>
<b>整体：</b>首次训练完成度极高，6/6动作+额外加练高位下拉4组。力量水平超预期——攀岩/足球底子在。<br><br>
<b>逐动作深度分析：</b><br>
① <b>腿举</b> 30kg (RPE 6→7→7) — 组1做了15次才RPE6，<b style="color:#e53935;">明显偏轻</b>。30kg对你的股四头肌几乎无挑战。<b>→下次试35-40kg</b><br>
② <b>推胸</b> 20→25→25kg (RPE 7→8→9) — <b>唯一触及RPE9的动作</b>，组间疲劳累积正常（12→12→10次）。组3最接近有效刺激点。<b>→保持25kg，目标三组冲11-12次</b><br>
③ <b>划船</b> 20→25→30kg (RPE 6→6→7) — 关键发现：加5kg后RPE纹丝不动（还是6）！<b style="color:#2d7d46;">背部力量显著强于预期</b>，攀岩迁移明显。<b>→下次25→30→35kg，可试探更高</b><br>
④ <b>推肩</b> 20→25→25kg (RPE 7→8→8) — 组2-3完全一致，25kg是稳定工作重量。<b>→保持</b><br>

// ═══════════ CLOUD SYNC (read from Pages, write to Gitee) ═══════════
const GITEE_TOKEN = '4094381111244372341df845351ffd88';
const GITEE_API = 'https://gitee.com/api/v5/repos/luiyizi/fitness-tracker/contents/data.json';
// Same-origin read: zero CORS, zero auth, always reachable if the page loaded
const PAGES_DATA = 'data.json';
let syncStatus = 'local'; // 'local' | 'syncing' | 'synced' | 'error'
let cloudSHA = null;
let lastCloudData = null;
let lastSyncError = '';

// Count filled sessions in a state object
function countFilledSessions(data) {
  let count = 0;
  SESSIONS.forEach((s, si) => {
    const sk = `s${si}`;
    if (!data[sk] || !data[sk].exs) return;
    let hasData = false;
    s.exs.forEach(eid => {
      const ed = data[sk].exs[eid];
      if (ed && ed.sets && ed.sets.some(set => (set.w && set.w !== '') || (set.r && set.r !== '') || set.rpe)) {
        hasData = true;
      }
    });
    if (hasData) count++;
  });
  return count;
}

// Base64 encode (safe for our ASCII JSON)
function b64Encode(str) {
  try { return btoa(unescape(encodeURIComponent(str))); }
  catch(e) { return btoa(str); }
}

function b64Decode(str) {
  try { return decodeURIComponent(escape(atob(str))); }
  catch(e) { return atob(str); }
}

// Fetch data: same-origin Pages first (fast, always works), Gitee API as fallback
async function fetchFromCloud() {
  // 1) Try same-origin data.json served by GitHub Pages — no CORS, no auth, same CDN as the HTML
  try {
    const resp = await fetch(PAGES_DATA + '?t=' + Date.now());
    if (resp.ok) {
      const data = await resp.json();
      if (data && typeof data === 'object' && data.s0) {
        lastCloudData = data;
        // Also try to get SHA from Gitee for later writes (non-blocking)
        fetch(GITEE_API + '?access_token=' + GITEE_TOKEN + '&t=' + Date.now())
          .then(r => r.ok ? r.json() : null)
          .then(j => { if (j && j.sha) cloudSHA = j.sha; })
          .catch(() => {});
        return data;
      }
    }
  } catch(e) {
    console.log('Pages fetch failed, trying Gitee:', e.message);
  }

  // 2) Fallback: Gitee API
  try {
    const resp = await fetch(GITEE_API + '?access_token=' + GITEE_TOKEN + '&t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const j = await resp.json();
    cloudSHA = j.sha;
    const decoded = b64Decode(j.content);
    lastCloudData = JSON.parse(decoded);
    return lastCloudData;
  } catch(e) {
    console.log('Gitee fetch also failed:', e.message);
    return null;
  }
}

// Push data to Gitee cloud
let pushLock = false;
async function pushToCloud(data) {
  if (pushLock) { console.log('Push already in progress, skipping'); return false; }
  pushLock = true;
  try {
    setSyncStatus('syncing');
    // Always fetch fresh SHA to avoid race conditions
    await fetchFromCloud();
    if (!cloudSHA) throw new Error('Cannot reach Gitee cloud');

    const content = b64Encode(JSON.stringify(data, null, 2));
    const body = new URLSearchParams();
    body.append('access_token', GITEE_TOKEN);
    body.append('content', content);
    body.append('sha', cloudSHA);
    body.append('message', 'sync: update training data');

    const resp = await fetch(GITEE_API, { method: 'PUT', body: body });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      // SHA conflict? Re-fetch and retry once
      if (resp.status === 400 || resp.status === 422) {
        console.log('SHA mismatch, re-fetching and retrying...');
        cloudSHA = null;
        await fetchFromCloud();
        if (!cloudSHA) throw new Error('Retry: cannot reach cloud');
        body.set('sha', cloudSHA);
        const resp2 = await fetch(GITEE_API, { method: 'PUT', body: body });
        if (!resp2.ok) {
          const err2 = await resp2.json().catch(() => ({}));
          throw new Error('HTTP ' + resp2.status + ': ' + JSON.stringify(err2));
        }
        const result2 = await resp2.json();
        cloudSHA = result2.content?.sha || result2.sha;
        lastCloudData = data;
        setSyncStatus('synced');
        localStorage.setItem(KEY + '_lastSync', Date.now().toString());
        return true;
      }
      throw new Error('HTTP ' + resp.status + ': ' + JSON.stringify(err));
    }
    const result = await resp.json();
    cloudSHA = result.content?.sha || result.sha;
    setSyncStatus('synced');
    lastCloudData = data;
    localStorage.setItem(KEY + '_lastSync', Date.now().toString());
    return true;
  } catch(e) {
    console.log('Cloud push failed:', e.message);
    lastSyncError = e.message;
    setSyncStatus('error');
    return false;
  } finally {
    pushLock = false;
  }
}

function setSyncStatus(st) {
  syncStatus = st;
  updateSyncIndicator();
}

    'syncing': '🔄 自动保存中 · <span style="color:#4a6cf7">☁️ 同步中...</span>',
    'synced': '🔄 自动保存中 · <span style="color:#2d7d46">☁️ 已同步</span> <span id="retrySync" style="color:#4a6cf7;font-weight:600;cursor:pointer;text-decoration:underline;margin-left:4px;">🔄 手动同步</span>',
    'error': '🔄 自动保存中 · <span style="color:#e53935">⚠️ 同步失败</span> <span id="retrySync" style="color:#4a6cf7;font-weight:600;cursor:pointer;text-decoration:underline;">重试</span><br><span style="font-size:10px;color:#999;">' + (lastSyncError || '网络错误') + '</span>',
  };
  el.innerHTML = statusText[syncStatus] || statusText['local'];
  // Also update header icon
  const headerEl = document.getElementById('headerSyncStatus');
  if (headerEl) {
    const headerIcons = {
      'local': '<span style="color:#f5a623" title="云端待同步">☁️</span>',
      'syncing': '<span style="color:#4a6cf7" title="同步中">🔄</span>',
      'synced': '<span style="color:#4caf50" title="已同步">☁️✅</span>',
      'error': '<span style="color:#e53935" title="同步失败">⚠️</span>'
    };
    headerEl.innerHTML = headerIcons[syncStatus] || headerIcons['local'];
  }
  // Bind retry
  const retry = document.getElementById('retrySync');
  if (retry) {
    retry.addEventListener('click', () => pushToCloud(state));
  }
}

// Auto-save debounce
let saveTimer;
let cloudPushTimer;
function autoSave() { 
  clearTimeout(saveTimer); 
  saveTimer = setTimeout(() => {
    saveState();
    // Cloud push with extra debounce (don't hammer API on every keystroke)
    clearTimeout(cloudPushTimer);
    cloudPushTimer = setTimeout(() => pushToCloud(state), 1200);
  }, 300); 
}

function exportData() {
  saveState(); // flush any pending saves
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fitness-cycle1-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 数据已导出！把文件发到电脑，点"导入数据"加载。');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported || typeof imported !== 'object') throw new Error('格式错误');
      state = imported;
      currentSession = state.currentSession || 0;
      localStorage.setItem(KEY, JSON.stringify(state));
      alert('✅ 导入成功！共 ' + Object.keys(state).filter(k=>k.startsWith('s')).length + ' 次训练数据已加载。');
      render();
    } catch(err) {
      alert('❌ 导入失败：文件格式不正确 (' + err.message + ')');
    }
  };
  reader.readAsText(file);
  e.target.value = ''; // reset so same file can be re-imported
}

  const appHtml = `<div class="app-header">
    <h1>🏋️ Cycle 1 · 第${s.n}次</h1>
    <div class="sub">${s.tt} · 第${s.wk}/3周 · <span id="headerSyncStatus">☁️</span></div>
  </div>
  <div class="session-bar">${sesHtml}</div>
  <div id="saveIndicator" class="save-indicator"></div>
  <div class="note-banner">📌 ${s.note}</div>
  <div class="pre-section">
    <h3>训练前状态</h3>
    <div class="pre-grid">${preHtml}</div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:14px;color:#555;font-weight:600;">📅 训练日期：</span>
      <input type="date" id="trainDate" value="${date}" style="font-size:15px;padding:6px 10px;border:1.5px solid #d0d4dc;border-radius:8px;background:#fafbff;">
    </div>
  </div>
  ${exHtml}
  <div class="bottom-section">
    <h3>🏃 有氧</h3>
    <div style="font-size:13px;color:#888;margin-bottom:6px;">💡 抗拒跑步？试试「坡度快走」：跑步机坡度10-12、速度4-5km/h，不喘但燃脂效率不输慢跑</div>
    <div class="tag-group">${cardioHtml}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
      <span style="font-size:14px;color:#888;">时长：</span>
      <div class="tag-group" style="margin-bottom:0;">${durHtml}</div>
    </div>
    <h3>🧘 拉伸</h3>
    <div class="tag-group">${stHtml}</div>
    <div style="background:#f8f9fc;border-radius:8px;padding:8px 12px;margin-bottom:8px;">${stGuide}</div>
    <div class="tag-group">
      <label><input type="checkbox" ${stDone} data-st-done> 以上全部完成 ✅</label>
      <label><input type="checkbox" ${stMiss} data-st-miss> 没做</label>
    </div>
    <h3>训练感受</h3>
    <div class="scales">${scaleHtml}</div>
    <div class="notes-area">
      <textarea placeholder="自由记录（非必填）：问题、异常、想调整的方向…">${notes || ''}</textarea>
    </div>
  </div>
  ${state[`s${currentSession}`].coachNote ? `
  <div style="background:#fff;margin:0 14px 10px;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-left:4px solid #4a6cf7;">
    <h3 style="font-size:15px;margin:0 0 6px;font-weight:600;">📋 教练评价与建议</h3>
    <div style="font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;">${state[`s${currentSession}`].coachNote}</div>
  </div>` : ''}
  ${coachHtml}
  <div style="height:60px"></div>`;

  document.getElementById('app').innerHTML = appHtml;
  bindEvents();
}

// ═══════════ EVENTS ═══════════
function bindEvents() {
  // Session switch
  document.querySelectorAll('.session-btn').forEach(el => {
    el.addEventListener('click', () => {
      currentSession = parseInt(el.dataset.si);
      state.currentSession = currentSession;
      localStorage.setItem(KEY, JSON.stringify(state));
      render();
    });
  });

  // Pre-check
  document.querySelectorAll('[data-pre]').forEach(el => {
    el.addEventListener('change', () => {
      const s = SESSIONS[currentSession];
      const pre = state[`s${currentSession}`].pre;
      pre[el.dataset.pre] = el.checked;
      // Mark session as started
      if (!pre.done && el.checked) pre.done = true;
      // Auto-set training date to today if not already stored
      if (!state[`s${currentSession}`].date) {
        state[`s${currentSession}`].date = new Date().toISOString().slice(0,10);
        const dp = document.getElementById('trainDate');
        if (dp) dp.value = state[`s${currentSession}`].date;
      }
      autoSave();
    });
  });

  // Training date picker
  const datePicker = document.getElementById('trainDate');
  if (datePicker) {
    datePicker.addEventListener('change', () => {
      state[`s${currentSession}`].date = datePicker.value;
      autoSave();
    });
  }

  // Weight/reps inputs
  document.querySelectorAll('.set-weight input, .set-reps input').forEach(el => {
    el.addEventListener('input', () => {
      const row = el.closest('.set-row');
      const eid = row.dataset.eid;
      const setIdx = parseInt(row.dataset.set);
      const field = el.dataset.field;
      state[`s${currentSession}`].exs[eid].sets[setIdx][field] = el.value;
      autoSave();
    });
  });

  // RPE radio
  document.querySelectorAll('.rpe-group input').forEach(el => {
    el.addEventListener('change', () => {
      if (!el.checked) return;
      const row = el.closest('.set-row');
      const eid = row.dataset.eid;
      const setIdx = parseInt(row.dataset.set);
      const val = parseInt(el.value);
      state[`s${currentSession}`].exs[eid].sets[setIdx].rpe = val;
      autoSave();
    });
  });

  // Done checkbox
  document.querySelectorAll('.set-done').forEach(el => {
    el.addEventListener('change', () => {
      const row = el.closest('.set-row');
      const eid = row.dataset.eid;
      const setIdx = parseInt(row.dataset.set);
      state[`s${currentSession}`].exs[eid].sets[setIdx].done = el.checked;
      autoSave();
    });
  });

  // Feel tags (per exercise, not per set)
  document.querySelectorAll('[data-feel]').forEach(el => {
    el.addEventListener('change', () => {
      const card = el.closest('.card');
      const eid = card.querySelector('.set-row').dataset.eid;
      const feel = el.dataset.feel;
      const feels = state[`s${currentSession}`].exs[eid].feel;
      if (el.checked && !feels.includes(feel)) feels.push(feel);
      else if (!el.checked) {
        const idx = feels.indexOf(feel);
        if (idx > -1) feels.splice(idx, 1);
      }
      autoSave();
    });
  });

  // Cardio type
  document.querySelectorAll('[name^="cardio_type_"]').forEach(el => {
    el.addEventListener('change', () => {
      if (el.checked) { state[`s${currentSession}`].cardio.type = el.value; autoSave(); }
    });
  });

  // Cardio dur
  document.querySelectorAll('[name^="cardio_dur_"]').forEach(el => {
    el.addEventListener('change', () => {
      if (el.checked) { state[`s${currentSession}`].cardio.dur = el.value; autoSave(); }
    });
  });

  // Stretch
  document.querySelectorAll('[data-st]').forEach(el => {
    el.addEventListener('change', () => {
      state[`s${currentSession}`].stretch[el.dataset.st] = el.checked;
      autoSave();
    });
  });
  document.querySelectorAll('[data-st-done]').forEach(el => {
    el.addEventListener('change', () => {
      state[`s${currentSession}`].stretch['_done'] = el.checked;
      if (el.checked) state[`s${currentSession}`].stretch['_miss'] = false;
      autoSave();
    });
  });
  document.querySelectorAll('[data-st-miss]').forEach(el => {
    el.addEventListener('change', () => {
      state[`s${currentSession}`].stretch['_miss'] = el.checked;
      if (el.checked) state[`s${currentSession}`].stretch['_done'] = false;
      autoSave();
    });
  });

  // Scales
  document.querySelectorAll('[name^="sc_"]').forEach(el => {
    el.addEventListener('change', () => {
      if (el.checked) {
        // Extract scale name from the radio name
        const name = el.name;
        const idx = name.indexOf('_', name.indexOf('_')+1)+1;
        const scaleName = name.substring(idx);
        state[`s${currentSession}`].scales[scaleName] = el.value;
        autoSave();
      }
    });
  });

  // Notes — auto-resize + save
  const ta = document.querySelector('.notes-area textarea');
  if (ta) {
    // Resize to fit existing content
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    ta.addEventListener('input', (e) => {
      state[`s${currentSession}`].notes = e.target.value;
      e.target.style.height = 'auto';
      e.target.style.height = e.target.scrollHeight + 'px';
      autoSave();
    });
  }

  // Date
  document.getElementById('trainDate')?.addEventListener('change', (e) => {
    state[`s${currentSession}`].date = e.target.value;
    autoSave();
  });

  // Exercise order
  document.querySelectorAll('select[data-field="order"]').forEach(el => {
    el.addEventListener('change', () => {
      const eid = el.dataset.eid;
      state[`s${currentSession}`].exs[eid].order = parseInt(el.value);
      autoSave();
    });
  });

}

// ═══════════ GO ═══════════
render();
updateSyncIndicator();
// On page load: pull cloud data and adopt it (cloud is source of truth)
setTimeout(() => initCloud(), 300);

async function initCloud() {
  // Check if we have a previously synced state
  const lastSync = localStorage.getItem(KEY + '_lastSync');
  if (lastSync) {
    // If we synced within last 24h, start with 'synced' status
    const syncAge = Date.now() - parseInt(lastSync);
    if (syncAge < 86400000) {
      setSyncStatus('synced');
    }
  }
  
  const cloud = await fetchFromCloud();
  if (!cloud) {
    // Keep previous synced status if we have one; don't overwrite to 'local'
    if (syncStatus === 'synced') {
      // Was synced, stay synced — just note cloud fetch failed
      console.log('Cloud fetch failed but keeping synced status (last sync was recent)');
    } else {
      setSyncStatus('local');
    }
    return;
  }
  // Always adopt cloud data
  state = cloud;
  // Fix: re-initialize any session whose exs is empty (missing exercise keys)
  // This handles the case where old cloud data has exs:{} instead of proper templates
  const dflt = defaultState();
  SESSIONS.forEach((s, si) => {
    const sk = `s${si}`;
    if (!state[sk]) state[sk] = dflt[sk];
    if (!state[sk].exs || Object.keys(state[sk].exs).length === 0) {
      state[sk].exs = dflt[sk].exs;
    }
    // Ensure order field exists on each exercise
    const exs = state[sk].exs;
    Object.keys(exs).forEach((eid, ei) => {
      if (!exs[eid].order) exs[eid].order = ei + 1;
    });
  });
  // Don't jump to page 1 — use localStorage currentSession (cloud's may be stale)
  // Migrate old per-set feel to new per-exercise feel
  SESSIONS.forEach((s, si) => {
    const sk = `s${si}`;
    const exs = state[sk].exs;
    if (!exs) return;
    Object.keys(exs).forEach(eid => {
      const ed = exs[eid];
      // If feel is still on sets (old format), migrate to exercise level
      if (ed.sets && ed.sets[0] && ed.sets[0].feel !== undefined) {
        if (!ed.feel) ed.feel = [];
        // Collect unique feels from all sets
        const allFeels = new Set();
        ed.sets.forEach(set => {
          if (set.feel) set.feel.forEach(f => allFeels.add(f));
          delete set.feel;
        });
        ed.feel = [...allFeels];
      }
      // Ensure feel array exists
      if (!ed.feel) ed.feel = [];
    });
  });
  currentSession = currentSession || state.currentSession || 0;
  state.currentSession = currentSession;
  localStorage.setItem(KEY, JSON.stringify(state));
  setSyncStatus('synced');
  localStorage.setItem(KEY + '_lastSync', Date.now().toString());
  render();
  updateSyncIndicator();
  console.log('Adopted cloud data (' + countFilledSessions(cloud) + ' sessions)');
}
</script>
